<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h2>Dashboard</h2>

<p id="message"></p>
<p id="status"></p>

<button onclick="logout()">Logout</button>

<script>

// 🔥 Helper: Fetch with auto refresh
async function fetchWithAuth(url, options = {}) {
    let accessToken = localStorage.getItem("accessToken");

    options.headers = {
        ...options.headers,
        "Authorization": "Bearer " + accessToken
    };

    let res = await fetch(url, options);

    // 🔥 If token expired
    if (res.status === 401) {
        console.log("⚠️ Access token expired. Refreshing...");

        const refreshToken = localStorage.getItem("refreshToken");

        const refreshRes = await fetch("https://jwt-auth-project-pzf7.onrender.com/refresh", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ refreshToken })
        });

        const refreshData = await refreshRes.json();

        console.log("👉 Refresh response:", refreshData);

        if (refreshData.accessToken) {
            // ✅ Save new access token
            localStorage.setItem("accessToken", refreshData.accessToken);

            console.log("✅ New access token saved");

            // 🔁 Retry original request
            options.headers["Authorization"] = "Bearer " + refreshData.accessToken;
            return fetch(url, options);
        } else {
            console.log("❌ Refresh failed → logging out");
            logout();
        }
    }

    return res;
}


// 🔹 Load Dashboard
async function loadDashboard() {
    const status = document.getElementById("status");

    console.log("👉 Loading dashboard...");

    try {
        const res = await fetchWithAuth("https://jwt-auth-project-pzf7.onrender.com/dashboard");

        console.log("👉 Response status:", res.status);

        if (!res.ok) {
            status.innerText = "Session expired. Please login again.";
            return;
        }

        const data = await res.json();

        console.log("👉 Response data:", data);

        document.getElementById("message").innerText =
            data.message + " " + data.user.username;

    } catch (error) {
        console.error("❌ Dashboard error:", error);
        status.innerText = "Error loading dashboard!";
    }
}


// 🔹 Logout
function logout() {
    console.log("👉 Logging out...");

    localStorage.removeItem("accessToken");
    localStorage.removeItem("refreshToken");

    window.location.href = "login.html";
}


// 🔥 Run on load
loadDashboard();

</script>

</body>
</html>
