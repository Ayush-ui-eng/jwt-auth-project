<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h2>Login</h2>

<form id="loginForm">
    <input type="text" id="username" placeholder="Username" required><br>
    <input type="password" id="password" placeholder="Password" required><br>

    <button type="submit">Login</button>
</form>

<p id="status"></p>

<p>New user? <a href="signup.html">Signup</a></p>

<script>
document.getElementById("loginForm").addEventListener("submit", login);

async function login(e) {
    e.preventDefault();

    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;
    const status = document.getElementById("status");

    status.innerText = "Logging in...";

    console.log("👉 Sending login request:", { username, password });

    try {
        const res = await fetch("http://localhost:3000/login", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ username, password })
        });

        console.log("👉 Response status:", res.status);

        let data;
        try {
            data = await res.json();
        } catch {
            throw new Error("Invalid JSON response");
        }

        console.log("👉 LOGIN RESPONSE:", data);

        // ✅ STRICT CHECK
        if (res.ok && data.accessToken && data.refreshToken) {

            // 🔥 SAVE TOKENS
            localStorage.setItem("accessToken", data.accessToken);
            localStorage.setItem("refreshToken", data.refreshToken);

            console.log("✅ Tokens saved successfully");

            // 🔍 VERIFY IMMEDIATELY
            console.log("Stored accessToken:", localStorage.getItem("accessToken"));
            console.log("Stored refreshToken:", localStorage.getItem("refreshToken"));

            // Redirect
            window.location.href = "dashboard.html";

        } else {
            console.log("❌ Login failed response:", data);
            status.innerText = data.message || "Login failed";
        }

    } catch (error) {
        console.error("❌ Login error:", error);
        status.innerText = "Server error or backend not running";
    }
}
</script>

</body>
</html>
