<!DOCTYPE html>
<html>
<head>
    <title>Signup</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h2>Signup</h2>

<input type="text" id="username" placeholder="Username"><br>
<input type="password" id="password" placeholder="Password"><br>

<button onclick="signup()">Signup</button>

<p id="status"></p>

<p>Already have account? <a href="login.html">Login</a></p>

<script>
async function signup() {
    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;
    const status = document.getElementById("status");

    // 🔍 Frontend log
    console.log("👉 Signup clicked:", { username, password });

    // ⚠️ Basic validation
    if (!username || !password) {
        status.innerText = "Please fill all fields";
        return;
    }

    try {
        const res = await fetch("https://jwt-auth-project-pzf7.onrender.com/signup", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ username, password })
        });

        console.log("👉 Response status:", res.status);

        const data = await res.json();

        console.log("👉 Response data:", data);

        // ✅ Show message on UI instead of only alert
        status.innerText = data.message;

    } catch (error) {
        console.error("❌ Signup error:", error);
        status.innerText = "Something went wrong!";
    }
}
</script>

</body>
</html>
